<div class="container">
<h2>Calculador de Eficiência</h2>

<label>Dimensões da Caixa (m):</label>
<div class="row">
<input type="number" id="caixa-comp" step="any" placeholder="Comp. (ex: 0.8)">
<input type="number" id="caixa-larg" step="any" placeholder="Larg.">
<input type="number" id="caixa-alt" step="any" placeholder="Alt.">
</div>
